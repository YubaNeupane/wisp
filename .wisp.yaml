  mode: PR               # 'pr' (default) or 'comment' — post suggestions inline instead of opening a PR
  docs:
    focus: [README.md]   # only touch these
    ignore: [CHANGELOG.md]      # never touch these
  ignore_authors: [mybot]       # skip PRs from these authors
  ignore_labels: [no-docs]      # skip PRs with these labels
  instructions: |               # extra rules for the LLM
    Always sort env var tables alphabetically. i want the most details on what was changes and logs of what was changes. i want architure diagrams and all that stuff. make it nice and easy to follow.
  pr:
    draft: true                 # open docs PRs as drafts